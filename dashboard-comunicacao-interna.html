<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IntraNet — Dashboard de Comunicação Interna</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* =============================================
       RESET & VARIÁVEIS CSS
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:        #111827;
      --ink-muted:  #6B7280;
      --ink-light:  #9CA3AF;
      --surface:    #F9FAFB;
      --card:       #FFFFFF;
      --border:     #E5E7EB;
      --accent:     #0F6FBF;
      --accent-2:   #D97706;
      --accent-3:   #059669;
      --danger:     #DC2626;
      --radius:     10px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:  0 4px 16px rgba(0,0,0,.08);
      --transition: 0.2s ease;
    }
    html { font-size: 15px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* =============================================
       TOPBAR
       ============================================= */
    .topbar {
      background: var(--ink);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .topbar-brand {
      display: flex; align-items: center; gap: .6rem;
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; letter-spacing: -.01em;
    }
    .topbar-brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .topbar-nav { display: flex; gap: .25rem; }
    .topbar-nav button {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.65); font-size: .85rem; font-family: inherit;
      padding: .4rem .9rem; border-radius: 6px;
      transition: var(--transition);
    }
    .topbar-nav button:hover, .topbar-nav button.active { background: rgba(255,255,255,.1); color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: .8rem; }
    .api-status { display: flex; align-items: center; gap: .4rem; font-size: .78rem; color: rgba(255,255,255,.5); }
    .api-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-3); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* =============================================
       LAYOUT PRINCIPAL
       ============================================= */
    .app-body { display: flex; flex: 1; }
    .sidebar {
      width: 280px; min-width: 280px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: calc(100vh - 56px);
      position: sticky; top: 56px;
      overflow-y: auto;
    }
    .main-content { flex: 1; padding: 1.8rem 2rem; min-width: 0; }

    /* =============================================
       SIDEBAR — USUÁRIOS
       ============================================= */
    .sidebar-header {
      padding: 1.2rem 1.2rem .6rem;
      font-size: .7rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--ink-muted);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .user-count { background: var(--ink); color: #fff; font-size: .65rem; padding: 1px 6px; border-radius: 20px; }
    .user-search {
      margin: .8rem 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; display: flex; align-items: center; gap: .5rem;
      padding: .4rem .8rem;
    }
    .user-search input {
      background: none; border: none; outline: none;
      font-family: inherit; font-size: .85rem; color: var(--ink); flex: 1;
    }
    .user-search svg { color: var(--ink-light); flex-shrink: 0; }
    .user-list { padding: .5rem .7rem; flex: 1; }
    .user-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .7rem; border-radius: 8px; cursor: pointer;
      transition: var(--transition); border: 1.5px solid transparent;
      margin-bottom: 2px;
    }
    .user-item:hover { background: var(--surface); }
    .user-item.active { background: #EFF6FF; border-color: #BFDBFE; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7C3AED);
      color: #fff; font-size: .85rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; letter-spacing: -.02em;
    }
    .user-info .user-name { font-size: .88rem; font-weight: 500; line-height: 1.3; }
    .user-info .user-email { font-size: .73rem; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .user-item.active .user-name { color: var(--accent); }

    /* Esqueleto de carregamento */
    .skeleton { background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 5px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-item { display: flex; align-items: center; gap: .75rem; padding: .65rem .7rem; }
    .skel-avatar { width: 38px; height: 38px; border-radius: 50%; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .skel-line-a { height: 11px; width: 70%; }
    .skel-line-b { height: 9px; width: 50%; }

    /* =============================================
       PAINEL PRINCIPAL
       ============================================= */
    /* Perfil do usuário selecionado */
    .profile-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem 1.6rem;
      display: flex; align-items: flex-start; gap: 1.2rem;
      box-shadow: var(--shadow-sm); margin-bottom: 1.6rem;
      animation: fadeSlideUp .35s ease both;
    }
    @keyframes fadeSlideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; font-size: 1.4rem; flex-shrink: 0; }
    .profile-details h2 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: .3rem; }
    .profile-details .profile-email { color: var(--ink-muted); font-size: .85rem; }
    .profile-meta { display: flex; gap: .5rem; margin-top: .7rem; flex-wrap: wrap; }
    .badge {
      font-size: .72rem; padding: 3px 10px; border-radius: 20px;
      font-weight: 500; display: inline-flex; align-items: center; gap: 4px;
    }
    .badge-blue { background: #EFF6FF; color: #1D4ED8; }
    .badge-green { background: #ECFDF5; color: #065F46; }
    .badge-amber { background: #FFFBEB; color: #92400E; }

    /* Seção de postagens */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
    .post-count-badge { background: var(--ink); color: #fff; font-size: .7rem; padding: 2px 9px; border-radius: 20px; }

    .posts-grid { display: flex; flex-direction: column; gap: .9rem; }
    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem 1.4rem;
      box-shadow: var(--shadow-sm); cursor: pointer;
      transition: var(--transition); animation: fadeSlideUp .35s ease both;
      position: relative; overflow: hidden;
    }
    .post-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--accent); opacity:0; transition: var(--transition); }
    .post-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .post-card:hover::before { opacity:1; }
    .post-card.expanded { border-color: #BFDBFE; box-shadow: 0 0 0 2px #BFDBFE; }
    .post-card.expanded::before { opacity:1; }
    .post-title { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: .5rem; line-height: 1.35; text-transform: capitalize; }
    .post-body { font-size: .85rem; color: var(--ink-muted); line-height: 1.65; }
    .post-footer { display: flex; align-items: center; gap: .6rem; margin-top: .9rem; padding-top: .8rem; border-top: 1px solid var(--border); }
    .post-id { font-size: .72rem; color: var(--ink-light); }
    .comments-btn {
      margin-left: auto; display: flex; align-items: center; gap: .4rem;
      background: var(--surface); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px; font-size: .78rem;
      cursor: pointer; font-family: inherit; color: var(--ink-muted);
      transition: var(--transition);
    }
    .comments-btn:hover { background: #EFF6FF; border-color: #BFDBFE; color: var(--accent); }
    .comments-btn.loading { opacity: .6; pointer-events: none; }

    /* Comentários */
    .comments-panel {
      background: var(--surface); border-radius: 8px;
      padding: .9rem 1rem; margin-top: .8rem;
      border: 1px solid var(--border);
      display: none; animation: fadeSlideUp .25s ease both;
    }
    .comments-panel.open { display: block; }
    .comments-panel-title { font-size: .75rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: .7rem; }
    .comment-item { padding: .65rem 0; border-bottom: 1px dashed var(--border); }
    .comment-item:last-child { border-bottom: none; padding-bottom: 0; }
    .comment-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .3rem; }
    .comment-avatar { width: 24px; height: 24px; border-radius: 50%; font-size: .65rem; flex-shrink: 0; }
    .comment-name { font-size: .8rem; font-weight: 600; }
    .comment-email { font-size: .72rem; color: var(--ink-muted); }
    .comment-body { font-size: .82rem; color: var(--ink-muted); line-height: 1.6; }
    .comment-spinner { text-align: center; padding: .8rem; font-size: .8rem; color: var(--ink-light); }

    /* Estado de erro */
    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: var(--radius); padding: 1.2rem 1.4rem;
      display: flex; align-items: flex-start; gap: .8rem; margin-bottom: 1.2rem;
    }
    .error-box svg { color: var(--danger); flex-shrink: 0; margin-top: 1px; }
    .error-box h4 { font-size: .9rem; color: #991B1B; margin-bottom: .3rem; }
    .error-box p { font-size: .82rem; color: #B91C1C; }
    .retry-btn {
      margin-top: .7rem; background: var(--danger); color: #fff;
      border: none; padding: 5px 14px; border-radius: 6px; font-size: .8rem;
      cursor: pointer; font-family: inherit; transition: var(--transition);
    }
    .retry-btn:hover { background: #B91C1C; }

    /* Estado vazio */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--ink-muted);
    }
    .empty-state svg { margin-bottom: 1rem; opacity: .35; }
    .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--ink); margin-bottom: .4rem; }
    .empty-state p { font-size: .85rem; }

    /* Toast de notificação */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--ink); color: #fff;
      padding: .7rem 1.2rem; border-radius: 8px;
      font-size: .83rem; box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: .5rem;
      z-index: 999; opacity: 0; transform: translateY(8px);
      transition: all .25s ease; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.error { background: #DC2626; }
    .toast.success { background: var(--accent-3); }

    /* Footer */
    .app-footer { text-align: center; padding: 1rem; font-size: .73rem; color: var(--ink-light); border-top: 1px solid var(--border); }

    /* Responsivo */
    @media (max-width: 900px) {
      .sidebar { width: 240px; min-width: 240px; }
    }
    @media (max-width: 640px) {
      .app-body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; max-height: 240px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="dot"></span>
    IntraNet
  </div>
  <nav class="topbar-nav">
    <button class="active">Feed</button>
    <button onclick="showToast('Em desenvolvimento', 'info')">Equipes</button>
    <button onclick="showToast('Em desenvolvimento', 'info')">Arquivos</button>
  </nav>
  <div class="topbar-right">
    <div class="api-status">
      <span class="api-dot" id="apiDot"></span>
      <span id="apiStatusText">Conectando...</span>
    </div>
  </div>
</header>

<div class="app-body">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      Colaboradores
      <span class="user-count" id="userCount">—</span>
    </div>
    <div class="user-search">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar colaborador…" oninput="filterUsers()" />
    </div>
    <div class="user-list" id="userList">
      <!-- Skeletons de carregamento -->
      <div class="skel-item" id="skel1">
        <div class="skeleton skel-avatar"></div>
        <div class="skel-lines"><div class="skeleton skel-line-a"></div><div class="skeleton skel-line-b"></div></div>
      </div>
      <div class="skel-item" id="skel2">
        <div class="skeleton skel-avatar"></div>
        <div class="skel-lines"><div class="skeleton skel-line-a"></div><div class="skeleton skel-line-b"></div></div>
      </div>
      <div class="skel-item" id="skel3">
        <div class="skeleton skel-avatar"></div>
        <div class="skel-lines"><div class="skeleton skel-line-a"></div><div class="skeleton skel-line-b"></div></div>
      </div>
    </div>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content" id="mainContent">
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <h3>Selecione um colaborador</h3>
      <p>Escolha um membro da equipe na barra lateral para ver suas postagens e atividades.</p>
    </div>
    <div id="profileSection" style="display:none"></div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer class="app-footer">
  IntraNet Dashboard v1.0 · Protótipo · Dados via <a href="https://jsonplaceholder.typicode.com" target="_blank" style="color:var(--accent)">JSONPlaceholder</a> · Arquitetura MVC + REST
</footer>

<script>
/* =======================================
   CAMADA MODEL — Lógica de dados e API
   ======================================= */
const API_BASE = 'https://jsonplaceholder.typicode.com';
const TIMEOUT_MS = 8000;

// Cores para avatares
const AVATAR_GRADIENTS = [
  ['#0F6FBF','#7C3AED'], ['#059669','#0891B2'], ['#D97706','#DC2626'],
  ['#7C3AED','#DB2777'], ['#0891B2','#059669'], ['#DC2626','#D97706'],
  ['#1D4ED8','#0F6FBF'], ['#065F46','#059669'], ['#92400E','#D97706'],
  ['#4338CA','#7C3AED']
];

function avatarStyle(index) {
  const [c1, c2] = AVATAR_GRADIENTS[index % AVATAR_GRADIENTS.length];
  return `background: linear-gradient(135deg, ${c1}, ${c2}); color:#fff;`;
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

// fetchWithTimeout: implementa Timeout e tratamento de exceção (try/catch)
async function fetchWithTimeout(url, timeoutMs = TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    return await res.json();
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') throw new Error(`Timeout: a API não respondeu em ${timeoutMs/1000}s`);
    throw err;
  }
}

const Model = {
  users: [],
  async fetchUsers() {
    return fetchWithTimeout(`${API_BASE}/users`);
  },
  async fetchPostsByUser(userId) {
    return fetchWithTimeout(`${API_BASE}/posts?userId=${userId}`);
  },
  async fetchCommentsByPost(postId) {
    return fetchWithTimeout(`${API_BASE}/comments?postId=${postId}`);
  }
};

/* =======================================
   CAMADA VIEW — Renderização HTML
   ======================================= */
const View = {
  renderUserItem(user, index, isActive) {
    return `
      <div class="user-item ${isActive ? 'active' : ''}" onclick="Controller.selectUser(${user.id})" data-name="${user.name.toLowerCase()}" data-email="${user.email.toLowerCase()}">
        <div class="avatar" style="${avatarStyle(index)}">${initials(user.name)}</div>
        <div class="user-info">
          <div class="user-name">${user.name}</div>
          <div class="user-email">${user.email}</div>
        </div>
      </div>`;
  },

  renderProfile(user, index, postCount) {
    const company = user.company?.name || 'Colaborador';
    const city = user.address?.city || '—';
    return `
      <div class="profile-card" id="profileCard">
        <div class="avatar profile-avatar" style="${avatarStyle(index)}">${initials(user.name)}</div>
        <div class="profile-details">
          <h2>${user.name}</h2>
          <div class="profile-email">${user.email} · ${user.phone}</div>
          <div class="profile-meta">
            <span class="badge badge-blue">
              <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              ${company}
            </span>
            <span class="badge badge-green">
              <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${city}
            </span>
            <span class="badge badge-amber">
              <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${postCount} postagens
            </span>
          </div>
        </div>
      </div>`;
  },

  renderPost(post, index) {
    return `
      <div class="post-card" id="post-${post.id}">
        <div class="post-title">${post.title}</div>
        <div class="post-body">${post.body}</div>
        <div class="post-footer">
          <span class="post-id">#${post.id}</span>
          <button class="comments-btn" id="commentsBtn-${post.id}" onclick="Controller.toggleComments(${post.id})">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Ver comentários
          </button>
        </div>
        <div class="comments-panel" id="commentPanel-${post.id}"></div>
      </div>`;
  },

  renderComment(comment, index) {
    return `
      <div class="comment-item">
        <div class="comment-header">
          <div class="avatar comment-avatar" style="${avatarStyle(index + 3)}">${initials(comment.name.split(' ').slice(0,2).join(' '))}</div>
          <div>
            <div class="comment-name">${comment.name.length > 40 ? comment.name.substring(0,38)+'…' : comment.name}</div>
            <div class="comment-email">${comment.email}</div>
          </div>
        </div>
        <div class="comment-body">${comment.body}</div>
      </div>`;
  },

  renderError(message, retryFn) {
    return `
      <div class="error-box">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div>
          <h4>Falha na comunicação com a API</h4>
          <p>${message}</p>
          <button class="retry-btn" onclick="${retryFn}">↺ Tentar novamente</button>
        </div>
      </div>`;
  }
};

/* =======================================
   CAMADA CONTROLLER — Coordenação
   ======================================= */
let allUsers = [];
let selectedUserId = null;
let openCommentPanels = new Set();
let commentCache = {};

const Controller = {
  async init() {
    try {
      allUsers = await Model.fetchUsers();
      document.getElementById('userCount').textContent = allUsers.length;
      // Remove skeletons
      ['skel1','skel2','skel3'].forEach(id => document.getElementById(id)?.remove());
      View.renderUserList(allUsers, null);
      setApiStatus(true);
      showToast('API conectada com sucesso!', 'success');
    } catch (err) {
      ['skel1','skel2','skel3'].forEach(id => document.getElementById(id)?.remove());
      document.getElementById('userList').innerHTML = View.renderError(err.message, 'Controller.init()');
      setApiStatus(false);
      showToast('Falha ao conectar com a API', 'error');
    }
  },

  async selectUser(userId) {
    selectedUserId = userId;
    openCommentPanels.clear();
    const user = allUsers.find(u => u.id === userId);
    const index = allUsers.findIndex(u => u.id === userId);
    // Atualiza sidebar
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.user-item[onclick*="(${userId})"]`)?.classList.add('active');
    // Mostra painel principal
    document.getElementById('emptyState').style.display = 'none';
    const section = document.getElementById('profileSection');
    section.style.display = 'block';
    section.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--ink-light);font-size:.85rem">Carregando postagens…</div>`;
    try {
      const posts = await Model.fetchPostsByUser(userId);
      let html = View.renderProfile(user, index, posts.length);
      html += `<div class="section-header"><h3 class="section-title">Postagens Recentes</h3><span class="post-count-badge">${posts.length}</span></div>`;
      html += `<div class="posts-grid">`;
      posts.forEach((post, i) => { html += View.renderPost(post, i); });
      html += `</div>`;
      section.innerHTML = html;
    } catch (err) {
      section.innerHTML = View.renderError(err.message, `Controller.selectUser(${userId})`);
      showToast('Erro ao carregar postagens', 'error');
    }
  },

  async toggleComments(postId) {
    const panel = document.getElementById(`commentPanel-${postId}`);
    const btn = document.getElementById(`commentsBtn-${postId}`);
    const card = document.getElementById(`post-${postId}`);
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      card.classList.remove('expanded');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Ver comentários`;
      openCommentPanels.delete(postId);
      return;
    }
    panel.classList.add('open');
    card.classList.add('expanded');
    btn.classList.add('loading');
    btn.innerHTML = `<span style="display:inline-block;animation:spin .7s linear infinite">⟳</span> Carregando…`;
    openCommentPanels.add(postId);
    try {
      let comments;
      if (commentCache[postId]) {
        comments = commentCache[postId];
      } else {
        comments = await Model.fetchCommentsByPost(postId);
        commentCache[postId] = comments;
      }
      panel.innerHTML = `<div class="comments-panel-title">💬 ${comments.length} comentários</div>` +
        comments.map((c, i) => View.renderComment(c, i)).join('');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${comments.length} comentários`;
    } catch (err) {
      panel.innerHTML = `<div style="font-size:.82rem;color:var(--danger);padding:.5rem">⚠ ${err.message}</div>`;
      btn.innerHTML = `⚠ Erro`;
      showToast('Erro ao carregar comentários', 'error');
    }
    btn.classList.remove('loading');
  }
};

// Render da lista de usuários (chamada após filtro também)
View.renderUserList = function(users, activeId) {
  const list = document.getElementById('userList');
  if (users.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;font-size:.83rem;color:var(--ink-muted)">Nenhum resultado encontrado.</div>`;
    return;
  }
  list.innerHTML = users.map((u) => {
    const index = allUsers.findIndex(x => x.id === u.id);
    return View.renderUserItem(u, index, u.id === activeId);
  }).join('');
};

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
  );
  View.renderUserList(filtered, selectedUserId);
}

function setApiStatus(online) {
  const dot = document.getElementById('apiDot');
  const txt = document.getElementById('apiStatusText');
  dot.style.background = online ? '#10B981' : '#EF4444';
  txt.textContent = online ? 'API online' : 'API offline';
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type] || 'ℹ'}</span> ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// Inicializa
Controller.init();
</script>
